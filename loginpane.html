<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background:white;
            font-family: 'Poppins', sans-serif;
        }
        .otp-container {
            padding: 25px;
            background: white;
            border-radius: 15px;
            box-shadow: 0px 5px 25px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: 350px;
            border: 2px solid #ff4b2b;
        }
        h4 {
            margin-bottom: 15px;
            color: #333;
            font-weight: 600;
        }
        .form-control {
            border-radius: 8px;
            border: 2px solid #ff4b2b;
            text-align: center;
            font-size: 16px;
            padding: 10px;
        }
        .btn-custom {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            background: linear-gradient(135deg, #ff512f, #dd2476);
            border: none;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-custom:hover {
            background: linear-gradient(135deg, #dd2476, #ff512f);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="otp-container">
        <h4>Enter Your Number</h4>
        <form action="otgenerate" method="post">
        <input type="number" class="form-control mb-3" placeholder="Enter your number" name="number">
        <button class="btn btn-custom">
            <i class="fas fa-key"></i> Get OTP
        </button>
    </div>
    </form>
</body>
</html>
